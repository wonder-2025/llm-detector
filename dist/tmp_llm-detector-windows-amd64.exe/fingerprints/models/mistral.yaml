name: Mistral
provider: Mistral AI
type: open_source
description: Mistral AI model family
version: "1.0"
response:
    headers:
        - name: x-mistral-model
          pattern: .*
          required: false
          weight: 0.25
    body_patterns:
        - field: model
          pattern: mistral
          required: false
          weight: 0.25
behavior:
    max_tokens: 32768
    supports_function_calling: true
    supports_vision: false
    supports_json_mode: true
    response_time_ms: 300-2000
    streaming_supported: true
tests:
    chinese_understanding: 0.1
    code_generation: 0.15
    context_window: 0.15
    instruction_following: 0.15
    math_reasoning: 0.15
    reasoning_quality: 0.15
    system_prompt_leak: 0.15
fingerprints:
    - test: math
      prompt: Calculate 13 * 17
      expected_keywords:
        - "221"
      weight: 0.15
    - test: self_identify
      prompt: What AI model are you? Who created you?
      expected_patterns:
        - (?i)mistral
        - (?i)mistral ai
      forbidden_patterns:
        - (?i)gpt-?4
        - (?i)openai
        - (?i)llama
      weight: 0.2
    - test: code
      prompt: Write a Python function to reverse a string
      expected_keywords:
        - def
        - return
      weight: 0.15
    - test: chinese
      prompt: 解释'朝三暮四'这个成语的意思
      expected_keywords:
        - 猴子
        - 比喻
      weight: 0.1
    - test: reasoning
      prompt: If it takes 5 machines 5 minutes to make 5 widgets...
      expected_keywords:
        - 5 minutes
      weight: 0.15
variants:
    - name: Mistral Large
      pattern: mistral-large
      features:
        - best_reasoning
        - 32k_context
    - name: Mistral Medium
      pattern: mistral-medium
      features:
        - balanced
        - good_performance
    - name: Mistral Small
      pattern: mistral-small
      features:
        - fast_response
        - cost_effective
    - name: Mixtral 8x7B
      pattern: mixtral.*8x7
      features:
        - moe_architecture
        - efficient
    - name: Mixtral 8x22B
      pattern: mixtral.*8x22
      features:
        - moe_architecture
        - large_model
scoring:
    header_match: 0.3
    body_keywords: 0.4
    json_structure: 0.3
    threshold: 0.7
