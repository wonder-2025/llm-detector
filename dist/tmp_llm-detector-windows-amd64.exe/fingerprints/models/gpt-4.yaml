name: GPT-4
provider: OpenAI
type: commercial
description: OpenAI GPT-4 model
version: "1.0"
response:
    headers:
        - name: x-request-id
          pattern: ^req_[a-zA-Z0-9]{24}$
          required: true
          weight: 0.25
        - name: openai-model
          pattern: gpt-4
          required: false
          weight: 0.25
        - name: openai-organization
          pattern: .*
          required: false
          weight: 0.25
    body_patterns:
        - field: model
          pattern: ^gpt-4
          required: true
          weight: 0.25
        - field: choices.0.message.role
          value: assistant
          required: true
          weight: 0.25
        - field: choices.0.finish_reason
          pattern: stop|length
          required: false
          weight: 0.25
behavior:
    max_tokens: 8192
    supports_function_calling: true
    supports_vision: true
    supports_json_mode: true
    response_time_ms: 500-3000
    streaming_supported: true
tests:
    chinese_understanding: 0.1
    code_generation: 0.15
    context_window: 0.15
    instruction_following: 0.15
    math_reasoning: 0.15
    reasoning_quality: 0.1
    system_prompt_leak: 0.2
fingerprints:
    - test: math
      prompt: Calculate 13 * 17 and explain your reasoning
      expected_keywords:
        - "221"
      expected_patterns:
        - 13.*17
        - multiply
      forbidden_keywords:
        - "220"
        - "222"
      weight: 0.15
    - test: self_identify
      prompt: What AI model are you? Who created you?
      expected_patterns:
        - (?i)gpt-?4
        - (?i)openai
        - (?i)assistant
      forbidden_patterns:
        - (?i)claude
        - (?i)anthropic
        - (?i)llama
        - (?i)meta
      weight: 0.2
    - test: code
      prompt: Write a Python function to reverse a string
      expected_keywords:
        - def
        - return
        - slice
      expected_patterns:
        - def.*reverse
        - def.*string
      weight: 0.15
    - test: chinese
      prompt: 解释'朝三暮四'这个成语的意思
      expected_keywords:
        - 猴子
        - 橡子
        - 栗子
        - 变化
      expected_patterns:
        - 比喻
        - 反复无常
      weight: 0.1
    - test: reasoning
      prompt: If it takes 5 machines 5 minutes to make 5 widgets, how long does it take 100 machines to make 100 widgets?
      expected_keywords:
        - 5 minutes
        - one minute
        - 1 minute
      expected_patterns:
        - each machine
        - one widget
      weight: 0.15
variants:
    - name: GPT-4o
      pattern: gpt-4o
      features:
        - faster_response
        - multimodal
    - name: GPT-4-turbo
      pattern: gpt-4-turbo
      features:
        - 128k_context
        - knowledge_cutoff_2023
    - name: GPT-4
      pattern: gpt-4
      features:
        - 8k_context
        - knowledge_cutoff_2021
scoring:
    header_match: 0.3
    body_keywords: 0.4
    json_structure: 0.3
    threshold: 0.7
