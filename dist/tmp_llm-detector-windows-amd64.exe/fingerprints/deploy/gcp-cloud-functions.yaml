name: Google Cloud Functions
type: serverless
description: Google Cloud Functions
version: "1.0"
endpoints:
    - path: /v1/projects
      method: GET
      description: List functions
      weight: 0.2
    - path: /v1/functions
      method: POST
      description: Call function
      weight: 0.2
headers:
    - name: x-goog-request-id
      pattern: '[a-zA-Z0-9-]+'
      required: false
      weight: 0.25
    - name: x-cloud-trace-context
      pattern: .*
      required: false
      weight: 0.25
body_patterns:
    - field: functions
      json_path: functions
      required: false
      weight: 0.25
    - field: name
      json_path: name
      required: false
      weight: 0.25
error_patterns: []
versions: []
deployment:
    default_port: "443"
    service_name: cloud-functions
    region_based: true
scoring:
    header_match: 0.3
    body_keywords: 0.4
    json_structure: 0.3
    threshold: 0.7
