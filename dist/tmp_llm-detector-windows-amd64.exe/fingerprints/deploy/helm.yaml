name: Helm
type: package_manager
description: Helm Kubernetes package manager
version: "1.0"
endpoints:
    - path: /api/charts
      method: GET
      description: Charts
      weight: 0.2
    - path: /api/releases
      method: GET
      description: Releases
      weight: 0.2
headers:
    - name: x-request-id
      pattern: '[a-zA-Z0-9-]+'
      required: false
      weight: 0.25
body_patterns:
    - field: charts
      json_path: charts
      required: false
      weight: 0.25
    - field: releases
      json_path: releases
      required: false
      weight: 0.25
error_patterns: []
versions: []
deployment:
    default_port: "443"
    service_name: helm
scoring:
    header_match: 0.3
    body_keywords: 0.4
    json_structure: 0.3
    threshold: 0.7
