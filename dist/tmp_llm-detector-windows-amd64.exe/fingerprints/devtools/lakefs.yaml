name: LakeFS
type: data_versioning
description: LakeFS data version control
version: "1.0"
endpoints:
    - path: /api/v1
      method: GET
      description: LakeFS API
      weight: 0.2
    - path: /api/v1/repositories
      method: GET
      description: Repositories
      weight: 0.2
    - path: /api/v1/branches
      method: GET
      description: Branches
      weight: 0.2
headers:
    - name: x-request-id
      pattern: '[a-zA-Z0-9-]+'
      required: false
      weight: 0.25
body_patterns:
    - field: pagination
      json_path: pagination
      required: false
      weight: 0.25
    - field: results
      json_path: results
      required: false
      weight: 0.25
error_patterns: []
versions: []
deployment:
    default_port: "8000"
    service_name: lakefs
scoring:
    header_match: 0.3
    body_keywords: 0.4
    json_structure: 0.3
    threshold: 0.7
