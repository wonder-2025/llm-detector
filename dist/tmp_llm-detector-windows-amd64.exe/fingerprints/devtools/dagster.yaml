name: Dagster
type: workflow_orchestration
description: Dagster data orchestration
version: "1.0"
endpoints:
    - path: /graphql
      method: POST
      description: GraphQL
      weight: 0.2
    - path: /api
      method: GET
      description: API
      weight: 0.2
headers:
    - name: x-request-id
      pattern: '[a-zA-Z0-9-]+'
      required: false
      weight: 0.25
body_patterns:
    - field: data
      json_path: data
      required: false
      weight: 0.25
    - field: repositoriesOrError
      json_path: repositoriesOrError
      required: false
      weight: 0.25
error_patterns: []
versions: []
deployment:
    default_port: "3000"
    service_name: dagster
scoring:
    header_match: 0.3
    body_keywords: 0.4
    json_structure: 0.3
    threshold: 0.7
