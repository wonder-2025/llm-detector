name: Apache Airflow
type: workflow_orchestration
description: Apache Airflow workflow platform
version: "1.0"
endpoints:
    - path: /api/v1
      method: GET
      description: Airflow API
      weight: 0.2
    - path: /api/v1/dags
      method: GET
      description: DAGs
      weight: 0.2
    - path: /api/v1/dagRuns
      method: GET
      description: DAG runs
      weight: 0.2
headers:
    - name: x-request-id
      pattern: '[a-zA-Z0-9-]+'
      required: false
      weight: 0.25
body_patterns:
    - field: dags
      json_path: dags
      required: false
      weight: 0.25
    - field: dag_runs
      json_path: dag_runs
      required: false
      weight: 0.25
error_patterns: []
versions: []
deployment:
    default_port: "8080"
    service_name: airflow
scoring:
    header_match: 0.3
    body_keywords: 0.4
    json_structure: 0.3
    threshold: 0.7
