name: 医渡云
type: medical_ai
description: 医渡云医疗AI平台
version: "1.0"
endpoints:
    - path: /api/v1
      method: GET
      description: API
      weight: 0.2
    - path: /api/v1/medical
      method: POST
      description: Medical analysis
      weight: 0.2
headers:
    - name: x-request-id
      pattern: '[a-zA-Z0-9-]+'
      required: false
      weight: 0.25
body_patterns:
    - field: result
      json_path: result
      required: false
      weight: 0.25
    - field: diagnosis
      json_path: diagnosis
      required: false
      weight: 0.25
error_patterns: []
versions: []
deployment:
    default_port: "443"
    service_name: yiducloud
scoring:
    header_match: 0.3
    body_keywords: 0.4
    json_structure: 0.3
    threshold: 0.7
