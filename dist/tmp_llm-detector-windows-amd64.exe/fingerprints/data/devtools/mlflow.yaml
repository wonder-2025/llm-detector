name: MLflow
type: experiment_tracking
description: MLflow open source ML platform
version: "1.0"
endpoints:
    - path: /api/2.0/mlflow
      method: GET
      description: MLflow API
      weight: 0.2
    - path: /api/2.0/mlflow/experiments
      method: GET
      description: Experiments
      weight: 0.2
    - path: /api/2.0/mlflow/runs
      method: GET
      description: Runs
      weight: 0.2
headers:
    - name: x-request-id
      pattern: '[a-zA-Z0-9-]+'
      required: false
      weight: 0.25
body_patterns:
    - field: experiments
      json_path: experiments
      required: false
      weight: 0.25
    - field: runs
      json_path: runs
      required: false
      weight: 0.25
error_patterns: []
versions: []
deployment:
    default_port: "5000"
    service_name: mlflow
scoring:
    header_match: 0.3
    body_keywords: 0.4
    json_structure: 0.3
    threshold: 0.7
