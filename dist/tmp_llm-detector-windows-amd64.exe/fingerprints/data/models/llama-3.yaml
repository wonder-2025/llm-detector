name: Llama 3
provider: Meta
type: open_source
description: Meta Llama 3 model family
version: "1.0"
response:
    headers:
        - name: x-powered-by
          pattern: (?i)llama
          required: false
          weight: 0.25
    body_patterns:
        - field: model
          pattern: llama-?3
          required: false
          weight: 0.25
behavior:
    max_tokens: 8192
    supports_function_calling: true
    supports_vision: false
    supports_json_mode: true
    response_time_ms: 200-2000
    streaming_supported: true
tests:
    chinese_understanding: 0.1
    code_generation: 0.2
    context_window: 0.15
    instruction_following: 0.15
    math_reasoning: 0.15
    reasoning_quality: 0.1
    system_prompt_leak: 0.15
fingerprints:
    - test: math
      prompt: Calculate 13 * 17
      expected_keywords:
        - "221"
      weight: 0.15
    - test: self_identify
      prompt: What AI model are you?
      expected_patterns:
        - (?i)llama
        - (?i)meta
      forbidden_patterns:
        - (?i)gpt-?4
        - (?i)openai
        - (?i)claude
        - (?i)anthropic
      weight: 0.2
    - test: code
      prompt: Write a Python function to reverse a string
      expected_keywords:
        - def
        - return
      expected_patterns:
        - slice
      weight: 0.2
    - test: chinese
      prompt: 解释'朝三暮四'这个成语的意思
      expected_patterns:
        - 猴子
        - 比喻
      weight: 0.1
    - test: reasoning
      prompt: If it takes 5 machines 5 minutes to make 5 widgets...
      expected_keywords:
        - 5 minutes
      weight: 0.15
variants:
    - name: Llama 3.1 405B
      pattern: llama-3.1.*405
      features:
        - largest_open_source
        - 128k_context
    - name: Llama 3.1 70B
      pattern: llama-3.1.*70
      features:
        - large_model
        - 128k_context
    - name: Llama 3 70B
      pattern: llama-3.*70
      features:
        - large_model
        - 8k_context
    - name: Llama 3 8B
      pattern: llama-3.*8
      features:
        - small_model
        - fast_inference
scoring:
    header_match: 0.3
    body_keywords: 0.4
    json_structure: 0.3
    threshold: 0.7
