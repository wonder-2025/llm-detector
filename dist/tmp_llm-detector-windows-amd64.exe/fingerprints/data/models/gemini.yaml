name: Gemini
provider: Google
type: commercial
description: Google Gemini model family
version: "1.0"
response:
    headers:
        - name: x-goog-api-version
          pattern: .*
          required: false
          weight: 0.25
    body_patterns:
        - field: modelVersion
          pattern: gemini
          required: false
          weight: 0.25
behavior:
    max_tokens: 1048576
    supports_function_calling: true
    supports_vision: true
    supports_json_mode: true
    response_time_ms: 400-3000
    streaming_supported: true
tests:
    chinese_understanding: 0.1
    code_generation: 0.15
    context_window: 0.2
    instruction_following: 0.15
    math_reasoning: 0.15
    reasoning_quality: 0.1
    system_prompt_leak: 0.15
fingerprints:
    - test: math
      prompt: Calculate 13 * 17
      expected_keywords:
        - "221"
      weight: 0.15
    - test: self_identify
      prompt: What AI model are you? Who created you?
      expected_patterns:
        - (?i)gemini
        - (?i)google
      forbidden_patterns:
        - (?i)gpt-?4
        - (?i)openai
        - (?i)claude
        - (?i)anthropic
      weight: 0.2
    - test: code
      prompt: Write a Python function to reverse a string
      expected_keywords:
        - def
        - return
      weight: 0.15
    - test: chinese
      prompt: 解释'朝三暮四'这个成语的意思
      expected_keywords:
        - 猴子
        - 比喻
      weight: 0.1
    - test: reasoning
      prompt: If it takes 5 machines 5 minutes to make 5 widgets...
      expected_keywords:
        - 5 minutes
      weight: 0.15
variants:
    - name: Gemini 1.5 Pro
      pattern: gemini-1.5-pro
      features:
        - best_reasoning
        - 1m_context
    - name: Gemini 1.5 Flash
      pattern: gemini-1.5-flash
      features:
        - fast_response
        - cost_effective
    - name: Gemini Ultra
      pattern: gemini-ultra
      features:
        - largest_model
        - complex_tasks
scoring:
    header_match: 0.3
    body_keywords: 0.4
    json_structure: 0.3
    threshold: 0.7
