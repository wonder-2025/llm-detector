name: vLLM
type: inference_engine
description: vLLM high-throughput inference engine
version: "1.0"
endpoints:
    - path: /v1/models
      method: GET
      description: List models
      weight: 0.2
    - path: /v1/chat/completions
      method: POST
      description: Chat completion (OpenAI compatible)
      weight: 0.2
    - path: /v1/completions
      method: POST
      description: Text completion
      weight: 0.2
    - path: /health
      method: GET
      description: Health check
      weight: 0.2
    - path: /metrics
      method: GET
      description: Prometheus metrics
      weight: 0.2
headers:
    - name: x-vllm-executor
      pattern: (gpu|cpu)
      required: false
      weight: 0.25
    - name: x-request-id
      pattern: .*
      required: false
      weight: 0.25
body_patterns:
    - field: data
      json_path: data
      required: false
      weight: 0.25
    - field: id
      pattern: chatcmpl-
      required: false
      weight: 0.25
    - field: object
      value: chat.completion
      required: false
      weight: 0.25
error_patterns:
    - pattern: The model .* is too large
      type: model_too_large
      weight: 0.15
    - pattern: CUDA out of memory
      type: gpu_oom
      weight: 0.15
    - pattern: tensor_parallel_size
      type: config_error
      weight: 0.15
versions:
    - pattern: 0.6.x
      features:
        - prefix_caching
        - chunked_prefill
    - pattern: 0.5.x
      features:
        - speculative_decoding
        - fp8_support
    - pattern: 0.4.x
      features:
        - basic_inference
        - tensor_parallel
deployment:
    default_port: "8000"
    docker_image: vllm/vllm-openai
    gpu_required: true
    process_name: python.*vllm
scoring:
    header_match: 0.3
    body_keywords: 0.4
    json_structure: 0.3
    threshold: 0.7
