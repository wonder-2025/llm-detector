name: Prometheus
type: monitoring
description: Prometheus monitoring
version: "1.0"
endpoints:
    - path: /api/v1
      method: GET
      description: API
      weight: 0.2
    - path: /api/v1/query
      method: GET
      description: Query
      weight: 0.2
    - path: /api/v1/targets
      method: GET
      description: Targets
      weight: 0.2
    - path: /metrics
      method: GET
      description: Metrics
      weight: 0.2
headers:
    - name: content-type
      pattern: application/json
      required: false
      weight: 0.25
body_patterns:
    - field: status
      json_path: status
      required: false
      weight: 0.25
    - field: data
      json_path: data
      required: false
      weight: 0.25
error_patterns: []
versions: []
deployment:
    default_port: "9090"
    service_name: prometheus
scoring:
    header_match: 0.3
    body_keywords: 0.4
    json_structure: 0.3
    threshold: 0.7
