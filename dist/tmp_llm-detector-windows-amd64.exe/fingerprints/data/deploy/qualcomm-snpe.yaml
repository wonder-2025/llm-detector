name: Qualcomm SNPE
type: edge_ml
description: Qualcomm Snapdragon Neural Processing Engine
version: "1.0"
endpoints:
    - path: /api
      method: GET
      description: SNPE API
      weight: 0.2
    - path: /api/models
      method: GET
      description: Models
      weight: 0.2
headers:
    - name: x-request-id
      pattern: '[a-zA-Z0-9-]+'
      required: false
      weight: 0.25
body_patterns:
    - field: models
      json_path: models
      required: false
      weight: 0.25
error_patterns: []
versions: []
deployment:
    default_port: "443"
    service_name: snpe
scoring:
    header_match: 0.3
    body_keywords: 0.4
    json_structure: 0.3
    threshold: 0.7
