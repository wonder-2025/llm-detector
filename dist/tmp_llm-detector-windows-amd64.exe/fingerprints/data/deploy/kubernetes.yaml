name: Kubernetes
type: orchestration
description: Kubernetes container orchestration
version: "1.0"
endpoints:
    - path: /api
      method: GET
      description: API root
      weight: 0.2
    - path: /api/v1/pods
      method: GET
      description: Pods
      weight: 0.2
    - path: /api/v1/nodes
      method: GET
      description: Nodes
      weight: 0.2
    - path: /apis/apps/v1/deployments
      method: GET
      description: Deployments
      weight: 0.2
headers:
    - name: x-kubernetes-pf-flowschema-uid
      pattern: '[a-zA-Z0-9-]+'
      required: false
      weight: 0.25
body_patterns:
    - field: kind
      json_path: kind
      required: false
      weight: 0.25
    - field: apiVersion
      json_path: apiVersion
      required: false
      weight: 0.25
    - field: items
      json_path: items
      required: false
      weight: 0.25
error_patterns: []
versions: []
deployment:
    default_port: "6443"
    service_name: kubernetes
scoring:
    header_match: 0.3
    body_keywords: 0.4
    json_structure: 0.3
    threshold: 0.7
