name: Istio
type: service_mesh
description: Istio service mesh
version: "1.0"
endpoints:
    - path: /api
      method: GET
      description: Istio API
      weight: 0.2
    - path: /api/v1/namespaces
      method: GET
      description: Namespaces
      weight: 0.2
headers:
    - name: x-request-id
      pattern: '[a-zA-Z0-9-]+'
      required: false
      weight: 0.25
body_patterns:
    - field: items
      json_path: items
      required: false
      weight: 0.25
error_patterns: []
versions: []
deployment:
    default_port: "15014"
    service_name: istio
scoring:
    header_match: 0.3
    body_keywords: 0.4
    json_structure: 0.3
    threshold: 0.7
