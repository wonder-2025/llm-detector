name: Grafana
type: monitoring
description: Grafana observability
version: "1.0"
endpoints:
    - path: /api
      method: GET
      description: API
      weight: 0.2
    - path: /api/dashboards
      method: GET
      description: Dashboards
      weight: 0.2
    - path: /api/datasources
      method: GET
      description: Datasources
      weight: 0.2
headers:
    - name: x-request-id
      pattern: '[a-zA-Z0-9-]+'
      required: false
      weight: 0.25
body_patterns:
    - field: dashboards
      json_path: dashboards
      required: false
      weight: 0.25
    - field: datasources
      json_path: datasources
      required: false
      weight: 0.25
error_patterns: []
versions: []
deployment:
    default_port: "3000"
    service_name: grafana
scoring:
    header_match: 0.3
    body_keywords: 0.4
    json_structure: 0.3
    threshold: 0.7
