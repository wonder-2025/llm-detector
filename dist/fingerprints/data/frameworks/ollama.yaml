name: Ollama
type: model_server
description: Ollama model serving platform
version: "1.0"
endpoints:
    - path: /api/tags
      method: GET
      description: List available models
      weight: 0.2
    - path: /api/generate
      method: POST
      description: Generate completion
      weight: 0.2
    - path: /api/chat
      method: POST
      description: Chat completion
      weight: 0.2
    - path: /api/version
      method: GET
      description: Get version
      weight: 0.2
    - path: /api/pull
      method: POST
      description: Pull model
      weight: 0.2
    - path: /api/delete
      method: DELETE
      description: Delete model
      weight: 0.2
headers:
    - name: Ollama-Version
      pattern: '[0-9]+\.[0-9]+\.[0-9]+'
      required: false
      weight: 0.25
    - name: Content-Type
      value: application/json
      required: true
      weight: 0.25
body_patterns:
    - field: models
      json_path: models
      required: false
      weight: 0.25
    - field: version
      json_path: version
      required: false
      weight: 0.25
    - field: response
      json_path: response
      required: false
      weight: 0.25
error_patterns:
    - pattern: model .* not found
      type: model_not_found
      weight: 0.15
    - pattern: pull model manifest
      type: pull_error
      weight: 0.15
versions:
    - pattern: 0.3.x
      features:
        - supports_tools
        - supports_vision
    - pattern: 0.2.x
      features:
        - basic_chat
        - model_management
deployment:
    default_port: "11434"
    docker_image: ollama/ollama
    process_name: ollama
scoring:
    header_match: 0.3
    body_keywords: 0.4
    json_structure: 0.3
    threshold: 0.7
