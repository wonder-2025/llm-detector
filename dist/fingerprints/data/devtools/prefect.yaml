name: Prefect
type: workflow_orchestration
description: Prefect workflow orchestration
version: "1.0"
endpoints:
    - path: /api
      method: GET
      description: Prefect API
      weight: 0.2
    - path: /api/flows
      method: GET
      description: Flows
      weight: 0.2
    - path: /api/deployments
      method: GET
      description: Deployments
      weight: 0.2
headers:
    - name: x-request-id
      pattern: '[a-zA-Z0-9-]+'
      required: false
      weight: 0.25
body_patterns:
    - field: flows
      json_path: flows
      required: false
      weight: 0.25
    - field: deployments
      json_path: deployments
      required: false
      weight: 0.25
error_patterns: []
versions: []
deployment:
    default_port: "4200"
    service_name: prefect
scoring:
    header_match: 0.3
    body_keywords: 0.4
    json_structure: 0.3
    threshold: 0.7
