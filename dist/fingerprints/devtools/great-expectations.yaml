name: Great Expectations
type: data_validation
description: Great Expectations data validation
version: "1.0"
endpoints:
    - path: /api
      method: GET
      description: GX API
      weight: 0.2
    - path: /api/expectations
      method: GET
      description: Expectations
      weight: 0.2
    - path: /api/checkpoints
      method: GET
      description: Checkpoints
      weight: 0.2
headers:
    - name: x-request-id
      pattern: '[a-zA-Z0-9-]+'
      required: false
      weight: 0.25
body_patterns:
    - field: expectations
      json_path: expectations
      required: false
      weight: 0.25
    - field: checkpoints
      json_path: checkpoints
      required: false
      weight: 0.25
error_patterns: []
versions: []
deployment:
    default_port: "443"
    service_name: great-expectations
scoring:
    header_match: 0.3
    body_keywords: 0.4
    json_structure: 0.3
    threshold: 0.7
