name: Ray Tune
type: hyperparameter_optimization
description: Ray Tune distributed tuning
version: "1.0"
endpoints:
    - path: /api
      method: GET
      description: Ray API
      weight: 0.2
    - path: /api/experiments
      method: GET
      description: Experiments
      weight: 0.2
    - path: /api/trials
      method: GET
      description: Trials
      weight: 0.2
headers:
    - name: x-request-id
      pattern: '[a-zA-Z0-9-]+'
      required: false
      weight: 0.25
body_patterns:
    - field: experiments
      json_path: experiments
      required: false
      weight: 0.25
    - field: trials
      json_path: trials
      required: false
      weight: 0.25
error_patterns: []
versions: []
deployment:
    default_port: "8265"
    service_name: ray-tune
scoring:
    header_match: 0.3
    body_keywords: 0.4
    json_structure: 0.3
    threshold: 0.7
