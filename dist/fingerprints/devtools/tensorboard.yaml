name: TensorBoard
type: experiment_tracking
description: TensorBoard visualization
version: "1.0"
endpoints:
    - path: /
      method: GET
      description: TensorBoard UI
      weight: 0.2
    - path: /data/runs
      method: GET
      description: Runs data
      weight: 0.2
    - path: /data/scalars
      method: GET
      description: Scalars
      weight: 0.2
headers:
    - name: x-request-id
      pattern: '[a-zA-Z0-9-]+'
      required: false
      weight: 0.25
body_patterns:
    - field: runs
      json_path: runs
      required: false
      weight: 0.25
    - field: tags
      json_path: tags
      required: false
      weight: 0.25
error_patterns: []
versions: []
deployment:
    default_port: "6006"
    service_name: tensorboard
scoring:
    header_match: 0.3
    body_keywords: 0.4
    json_structure: 0.3
    threshold: 0.7
