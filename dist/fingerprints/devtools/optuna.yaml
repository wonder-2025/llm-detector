name: Optuna
type: hyperparameter_optimization
description: Optuna hyperparameter optimization
version: "1.0"
endpoints:
    - path: /api
      method: GET
      description: Optuna API
      weight: 0.2
    - path: /api/studies
      method: GET
      description: Studies
      weight: 0.2
    - path: /api/trials
      method: GET
      description: Trials
      weight: 0.2
headers:
    - name: x-request-id
      pattern: '[a-zA-Z0-9-]+'
      required: false
      weight: 0.25
body_patterns:
    - field: studies
      json_path: studies
      required: false
      weight: 0.25
    - field: trials
      json_path: trials
      required: false
      weight: 0.25
error_patterns: []
versions: []
deployment:
    default_port: "8080"
    service_name: optuna
scoring:
    header_match: 0.3
    body_keywords: 0.4
    json_structure: 0.3
    threshold: 0.7
