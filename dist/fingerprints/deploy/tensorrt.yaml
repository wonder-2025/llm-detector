name: TensorRT
type: model_runtime
description: NVIDIA TensorRT inference
version: "1.0"
endpoints:
    - path: /api/v1
      method: GET
      description: TensorRT API
      weight: 0.2
    - path: /api/v1/models
      method: GET
      description: Models
      weight: 0.2
    - path: /api/v1/infer
      method: POST
      description: Inference
      weight: 0.2
headers:
    - name: x-request-id
      pattern: '[a-zA-Z0-9-]+'
      required: false
      weight: 0.25
body_patterns:
    - field: model_name
      json_path: model_name
      required: false
      weight: 0.25
    - field: outputs
      json_path: outputs
      required: false
      weight: 0.25
error_patterns: []
versions: []
deployment:
    default_port: "8000"
    service_name: tensorrt
scoring:
    header_match: 0.3
    body_keywords: 0.4
    json_structure: 0.3
    threshold: 0.7
