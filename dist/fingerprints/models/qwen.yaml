name: Qwen
provider: Alibaba
type: open_source
description: Alibaba Qwen model family
version: "1.0"
response:
    headers:
        - name: x-dashscope-call-type
          pattern: .*
          required: false
          weight: 0.25
    body_patterns:
        - field: model
          pattern: qwen
          required: false
          weight: 0.25
behavior:
    max_tokens: 32768
    supports_function_calling: true
    supports_vision: true
    supports_json_mode: true
    response_time_ms: 300-2000
    streaming_supported: true
tests:
    chinese_understanding: 0.2
    code_generation: 0.2
    context_window: 0.1
    instruction_following: 0.1
    math_reasoning: 0.15
    reasoning_quality: 0.1
    system_prompt_leak: 0.15
fingerprints:
    - test: math
      prompt: Calculate 13 * 17
      expected_keywords:
        - "221"
      expected_patterns:
        - 13.*17
        - multiply
      weight: 0.15
    - test: self_identify
      prompt: What AI model are you? Who created you?
      expected_patterns:
        - (?i)qwen
        - (?i)alibaba
        - (?i)通义
      forbidden_patterns:
        - (?i)gpt-?4
        - (?i)openai
        - (?i)claude
        - (?i)llama
      weight: 0.2
    - test: code
      prompt: Write a Python function to reverse a string
      expected_keywords:
        - def
        - return
      expected_patterns:
        - def.*reverse
      weight: 0.2
    - test: chinese
      prompt: 解释'朝三暮四'这个成语的意思
      expected_keywords:
        - 猴子
        - 故事
        - 比喻
      expected_patterns:
        - 反复无常
        - 变化
      weight: 0.2
    - test: reasoning
      prompt: If it takes 5 machines 5 minutes to make 5 widgets...
      expected_keywords:
        - 5 minutes
      weight: 0.15
variants:
    - name: Qwen2.5 72B
      pattern: qwen2.5.*72
      features:
        - large_model
        - 128k_context
    - name: Qwen2.5 7B
      pattern: qwen2.5.*7
      features:
        - small_model
        - fast_inference
    - name: Qwen-VL
      pattern: qwen.*vl
      features:
        - vision_capable
        - multimodal
    - name: Qwen-Coder
      pattern: qwen.*coder
      features:
        - code_specialized
        - programming
scoring:
    header_match: 0.3
    body_keywords: 0.4
    json_structure: 0.3
    threshold: 0.7
