name: Kibana
type: analytics
description: Kibana data visualization
version: "1.0"
endpoints:
    - path: /api
      method: GET
      description: API
      weight: 0.2
    - path: /api/status
      method: GET
      description: Status
      weight: 0.2
headers:
    - name: kbn-name
      pattern: .*
      required: false
      weight: 0.25
    - name: kbn-version
      pattern: .*
      required: false
      weight: 0.25
body_patterns:
    - field: version
      json_path: version
      required: false
      weight: 0.25
    - field: status
      json_path: status
      required: false
      weight: 0.25
error_patterns: []
versions: []
deployment:
    default_port: "5601"
    service_name: kibana
scoring:
    header_match: 0.3
    body_keywords: 0.4
    json_structure: 0.3
    threshold: 0.7
