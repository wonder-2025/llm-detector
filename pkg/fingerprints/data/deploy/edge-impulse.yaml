name: Edge Impulse
type: edge_ml
description: Edge Impulse edge ML platform
version: "1.0"
endpoints:
    - path: /api
      method: GET
      description: Edge Impulse API
      weight: 0.2
    - path: /api/projects
      method: GET
      description: Projects
      weight: 0.2
    - path: /api/deployment
      method: GET
      description: Deployment
      weight: 0.2
headers:
    - name: x-request-id
      pattern: '[a-zA-Z0-9-]+'
      required: false
      weight: 0.25
body_patterns:
    - field: projects
      json_path: projects
      required: false
      weight: 0.25
    - field: success
      json_path: success
      required: false
      weight: 0.25
error_patterns: []
versions: []
deployment:
    default_port: "443"
    service_name: edge-impulse
scoring:
    header_match: 0.3
    body_keywords: 0.4
    json_structure: 0.3
    threshold: 0.7
