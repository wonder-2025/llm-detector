name: 小鹏XNGP
type: autonomous_driving
description: 小鹏XNGP智能辅助驾驶
version: "1.0"
endpoints:
    - path: /api/v1
      method: GET
      description: API
      weight: 0.2
    - path: /api/v1/xngp
      method: POST
      description: XNGP
      weight: 0.2
headers:
