name: Momenta
type: autonomous_driving
description: Momenta自动驾驶
version: "1.0"
endpoints:
    - path: /api/v1
      method: GET
      description: API
      weight: 0.2
    - path: /api/v1/drive
      method: POST
      description: Drive
      weight: 0.2
headers:
    - name: x-request-id
      pattern: '[a-zA-Z0-9-]+'
      required: false
      weight: 0.25
body_patterns:
    - field: result
      json_path: result
      required: false
      weight: 0.25
error_patterns: []
versions: []
deployment:
    default_port: "443"
    service_name: momenta
scoring:
    header_match: 0.3
    body_keywords: 0.4
    json_structure: 0.3
    threshold: 0.7
