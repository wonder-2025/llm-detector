name: Weights & Biases
type: experiment_tracking
description: Weights & Biases ML experiment tracking
version: "1.0"
endpoints:
    - path: /api
      method: GET
      description: WandB API
      weight: 0.2
    - path: /graphql
      method: POST
      description: GraphQL
      weight: 0.2
    - path: /files
      method: GET
      description: Files
      weight: 0.2
headers:
    - name: x-request-id
      pattern: '[a-zA-Z0-9-]+'
      required: false
      weight: 0.25
    - name: x-wandb-frontend
      pattern: .*
      required: false
      weight: 0.25
body_patterns:
    - field: data
      json_path: data
      required: false
      weight: 0.25
    - field: viewer
      json_path: viewer
      required: false
      weight: 0.25
error_patterns: []
versions: []
deployment:
    default_port: "443"
    service_name: wandb
scoring:
    header_match: 0.3
    body_keywords: 0.4
    json_structure: 0.3
    threshold: 0.7
